name: Generate Parkour Activity Animation

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate parkour SVG
        env:
          GH_USERNAME: Adrix1412
          GH_TOKEN: ${{ secrets.PARKOUR_PAT }}
        run: node scripts/fetch-and-render.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/parkour.svg
          git diff --staged --quiet || git commit -m "chore: update parkour activity animation"
          git push
